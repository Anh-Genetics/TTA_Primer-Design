# Tham số Primer3 cho PCR thông thường (amplicon 200–1000 bp)
PRIMER_TASK: "pick_pcr_primers"
PRIMER_PICK_LEFT_PRIMER: 1
PRIMER_PICK_RIGHT_PRIMER: 1
PRIMER_PICK_INTERNAL_OLIGO: 0

# Kích thước primer
PRIMER_OPT_SIZE: 22
PRIMER_MIN_SIZE: 18
PRIMER_MAX_SIZE: 28

# Nhiệt độ nóng chảy (Tm)
PRIMER_OPT_TM: 60.0
PRIMER_MIN_TM: 57.0
PRIMER_MAX_TM: 63.0
PRIMER_PAIR_MAX_DIFF_TM: 3.0

# GC content
PRIMER_MIN_GC: 35.0
PRIMER_OPT_GC_PERCENT: 50.0
PRIMER_MAX_GC: 65.0

# Amplicon size (PCR thông thường: 200–1000 bp)
PRIMER_PRODUCT_SIZE_RANGE: "200-1000"
PRIMER_NUM_RETURN: 10

# Secondary structure
PRIMER_MAX_SELF_ANY_TH: 45.0
PRIMER_MAX_SELF_END_TH: 35.0
PRIMER_MAX_HAIRPIN_TH: 24.0
PRIMER_PAIR_MAX_COMPL_ANY_TH: 45.0
PRIMER_PAIR_MAX_COMPL_END_TH: 35.0

# Thermodynamic parameters
PRIMER_TM_FORMULA: 1
PRIMER_SALT_CORRECTIONS: 1
PRIMER_SALT_MONOVALENT: 50.0
PRIMER_SALT_DIVALENT: 1.5
PRIMER_DNTP_CONC: 0.2
PRIMER_DNA_CONC: 250.0
