# Tham số Primer3 cho probe (TaqMan hydrolysis probe)
# Chỉ thiết kế internal oligo (probe) — primer không bắt buộc
PRIMER_TASK: "pick_pcr_primers"
PRIMER_PICK_LEFT_PRIMER: 1
PRIMER_PICK_RIGHT_PRIMER: 1
PRIMER_PICK_INTERNAL_OLIGO: 1

# Probe — Internal oligo
PRIMER_INTERNAL_OPT_SIZE: 25
PRIMER_INTERNAL_MIN_SIZE: 18
PRIMER_INTERNAL_MAX_SIZE: 30
PRIMER_INTERNAL_OPT_TM: 70.0
PRIMER_INTERNAL_MIN_TM: 65.0
PRIMER_INTERNAL_MAX_TM: 75.0
PRIMER_INTERNAL_MIN_GC: 40.0
PRIMER_INTERNAL_OPT_GC_PERCENT: 55.0
PRIMER_INTERNAL_MAX_GC: 70.0
PRIMER_INTERNAL_MAX_SELF_ANY_TH: 45.0
PRIMER_INTERNAL_MAX_HAIRPIN_TH: 24.0

# Amplicon size cho TaqMan (nhỏ để hiệu quả)
PRIMER_PRODUCT_SIZE_RANGE: "70-150"
PRIMER_NUM_RETURN: 10

# Thermodynamic parameters
PRIMER_TM_FORMULA: 1
PRIMER_SALT_CORRECTIONS: 1
PRIMER_SALT_MONOVALENT: 50.0
PRIMER_SALT_DIVALENT: 1.5
PRIMER_DNTP_CONC: 0.2
PRIMER_DNA_CONC: 250.0
