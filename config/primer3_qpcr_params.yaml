# Tham số Primer3 cho qPCR (amplicon 70–200 bp, có internal probe TaqMan)
PRIMER_TASK: "pick_pcr_primers"
PRIMER_PICK_LEFT_PRIMER: 1
PRIMER_PICK_RIGHT_PRIMER: 1
PRIMER_PICK_INTERNAL_OLIGO: 1       # 1 = thiết kế TaqMan probe

# Kích thước primer
PRIMER_OPT_SIZE: 20
PRIMER_MIN_SIZE: 18
PRIMER_MAX_SIZE: 25

# Nhiệt độ nóng chảy (Tm) — Primer
PRIMER_OPT_TM: 60.0
PRIMER_MIN_TM: 58.0
PRIMER_MAX_TM: 62.0
PRIMER_PAIR_MAX_DIFF_TM: 2.0

# GC content — Primer
PRIMER_MIN_GC: 40.0
PRIMER_OPT_GC_PERCENT: 50.0
PRIMER_MAX_GC: 65.0

# Amplicon size (qPCR: 70–200 bp)
PRIMER_PRODUCT_SIZE_RANGE: "70-200"
PRIMER_NUM_RETURN: 10

# Secondary structure (thermodynamic)
PRIMER_MAX_SELF_ANY_TH: 45.0
PRIMER_MAX_SELF_END_TH: 35.0
PRIMER_MAX_HAIRPIN_TH: 24.0
PRIMER_PAIR_MAX_COMPL_ANY_TH: 45.0
PRIMER_PAIR_MAX_COMPL_END_TH: 35.0

# Probe — Internal oligo (TaqMan)
PRIMER_INTERNAL_OPT_SIZE: 22
PRIMER_INTERNAL_MIN_SIZE: 18
PRIMER_INTERNAL_MAX_SIZE: 30
PRIMER_INTERNAL_OPT_TM: 68.0
PRIMER_INTERNAL_MIN_TM: 65.0
PRIMER_INTERNAL_MAX_TM: 72.0
PRIMER_INTERNAL_MIN_GC: 40.0
PRIMER_INTERNAL_OPT_GC_PERCENT: 50.0
PRIMER_INTERNAL_MAX_GC: 65.0
PRIMER_INTERNAL_MAX_SELF_ANY_TH: 45.0
PRIMER_INTERNAL_MAX_HAIRPIN_TH: 24.0

# Thermodynamic parameters
PRIMER_TM_FORMULA: 1                # SantaLucia 1998
PRIMER_SALT_CORRECTIONS: 1
PRIMER_SALT_MONOVALENT: 50.0        # mM
PRIMER_SALT_DIVALENT: 1.5           # mM Mg2+
PRIMER_DNTP_CONC: 0.2               # mM
PRIMER_DNA_CONC: 250.0              # nM (single strand)
